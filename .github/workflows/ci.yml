name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
    # Avoid pull_request "closed" (merge): merge already triggers push to main, so e2e would run twice
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test:ci

  e2e:
    needs: lint-and-test
    # PR updates: only pull_request (feature-branch pushes do not match push.branches above).
    # Default-branch work: push to main or dev (includes post-merge), not duplicated with PR "closed".
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'dev'))
    runs-on: ubuntu-latest
    env:
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      BASE_VOL_URL: ${{ secrets.BASE_VOL_URL }}
      MONGODB_URI: ${{ secrets.MONGODB_URI }}
      # Session/JWT signing (random string). Not the same as AUTH_GOOGLE_SECRET.
      AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
      AUTH_TRUST_HOST: "true"
      AUTH_GOOGLE_ID: ${{ vars.AUTH_GOOGLE_ID }}
      AUTH_GOOGLE_SECRET: ${{ secrets.AUTH_GOOGLE_SECRET }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build application
        run: npm run build

      - name: Run E2E tests
        run: npm run test:e2e
